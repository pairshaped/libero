name = "libero"
version = "3.0.0"
description = "Typed Gleam RPC for Lustre SPAs without REST, JSON codecs, or hand-written dispatch tables"
licences = ["MIT"]
repository = { type = "github", user = "pairshaped", repo = "libero" }

# No target specified - cross-target package.
# Erlang-only modules: libero/trace, libero (the generator main)
# JS-only modules: libero/rpc
# Cross-target modules: libero/error, libero/wire
#
# Per-target @external specs keep each module usable only on its intended
# target. The package as a whole can be depended on from both Erlang and
# JavaScript consumer packages.

[dependencies]
gleam_stdlib = ">= 0.69.0 and < 1.0.0"
glance = "~> 6.0"
simplifile = "~> 2.0"
gleam_crypto = "~> 1.5"
lustre = "~> 5.6"
argv = "~> 1.0"
tom = ">= 2.0.2 and < 3.0.0"

[dev-dependencies]
glinter = "~> 2.12"
gleeunit = "~> 1.0"

[tools.glinter]
stats = true
warnings_as_errors = true
include = ["src/"]

[tools.glinter.rules]
# Libero's public API is consumed from GENERATED code in consumer
# packages (dispatch modules and per-module client stubs under each
# consumer's src/*/generated/libero/ tree). The linter can't see those
# call sites from inside lib/libero, so it would flag every public
# type and function as unused. Turn off the check globally for the
# library.
unused_exports = "off"

[tools.glinter.ignore]
"src/libero.gleam" = [
  "unnecessary_string_concatenation",
]
"src/libero/codegen.gleam" = [
  "unnecessary_string_concatenation",
  "label_possible",
  "thrown_away_error",
  "deep_nesting",
]
"src/libero/remote_data.gleam" = [
  "discarded_result",
  "avoid_panic",
]
"src/libero/walker.gleam" = [
  "deep_nesting",
]
"src/libero/trace.gleam" = [
  "stringly_typed_error",
]
"src/libero/rpc.gleam" = [
  "avoid_panic",
  "discarded_result",
]
"src/libero/wire.gleam" = [
  "avoid_panic",
  "discarded_result",
]
# v4 CLI modules use String errors for simplicity.
"src/libero/cli/new.gleam" = ["stringly_typed_error"]
"src/libero/cli/add.gleam" = ["stringly_typed_error", "thrown_away_error"]
"src/libero/cli/gen.gleam" = ["stringly_typed_error"]
"src/libero/cli/build.gleam" = ["stringly_typed_error"]
"src/libero/toml_config.gleam" = ["stringly_typed_error", "label_possible", "error_context_lost", "thrown_away_error"]
